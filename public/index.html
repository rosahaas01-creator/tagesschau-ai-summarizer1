<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tagesschau News-Feed (Safe Mode)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-2xl mx-auto">
        <h1 class="text-3xl font-bold text-blue-900 mb-8 border-b pb-4">Tagesschau News-Feed</h1>
        
        <div id="feed" class="space-y-6">
            <div class="text-slate-500 animate-pulse">Lade Nachrichten...</div>
        </div>
    </div>

    <script>
        async function loadFeed() {
            const container = document.getElementById('feed');
            try {
                const res = await fetch('/api/feed');
                if (!res.ok) throw new Error("API-Fehler (" + res.status + ")");
                
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="bg-blue-50 text-blue-700 p-6 rounded-xl border border-blue-100 italic text-center">
                            Keine Nachrichten gefunden.<br>
                            <a href="/api/check-video" target="_blank" class="underline font-bold mt-2 block">Hier klicken, um Analyse zu starten!</a>
                        </div>`;
                    return;
                }
                
                container.innerHTML = data.map(item => `
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <h2 class="text-xl font-bold text-slate-800 mb-2">${String(item.title || "Unbekannte Folge")}</h2>
                        <div class="text-xs text-slate-400 mb-4">Erstellt am: ${new Date(item.date).toLocaleString('de-DE')}</div>
                        <div class="text-slate-600 mb-6 leading-relaxed">
                            <strong>Zusammenfassung:</strong><br>
                            ${String(item.summary || "Keine Zusammenfassung verfügbar.")}
                        </div>
                        <div class="bg-slate-50 p-4 rounded-lg text-sm text-slate-500 border border-slate-100">
                            <strong>Details:</strong><br>
                            ${String(item.visuals || "Keine Details vorhanden.")}
                        </div>
                    </div>
                `).join('');
                
            } catch (err) {
                container.innerHTML = \`<div class="bg-red-50 text-red-600 p-4 rounded-lg border border-red-200">
                    <strong>Fehler beim Laden:</strong><br>\${err.message}
                </div>\`;
            }
        }
        loadFeed();
    </script>
</body>
</html>
